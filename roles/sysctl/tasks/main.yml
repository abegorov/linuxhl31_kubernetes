---
- name: Update sysctl values
  ansible.posix.sysctl:
    name: '{{ item.key }}'
    value: '{{ item.value }}'
    reload: true
    sysctl_file: '{{ sysctl_file }}'
  loop: '{{ sysctl_values | ansible.builtin.dict2items }}'
  loop_control:
    label: '{{ item.key }}={{ item.value }}'
  tags: [sysctl]
...
